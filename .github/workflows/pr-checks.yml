name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  attestations: read

env:
  XCFRAMEWORK_ARTIFACT_NAME: pgpmobile-xcframework
  XCFRAMEWORK_ZIP: PgpMobile.xcframework.zip
  ARM64E_MANIFEST: PgpMobile.arm64e-build-manifest.json
  ARM64E_STAGE1_RELEASE_TAG: rust-arm64e-stage1-stable197-20260713T191930Z-027700f-r29277996466-a1

jobs:
  rust-dependency-audit:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          rustc +stable --version
          cargo +stable --version
      - name: Audit Rust dependencies
        run: |
          cargo +stable install cargo-audit --version 0.22.2 --locked
          cargo audit --file pgp-mobile/Cargo.lock --deny warnings

  rust-full-tests:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          # Keep ordinary Rust validation on the official stable channel.
          # The arm64e stage1 compiler is resolved explicitly by build-xcframework.sh.
          rustc +stable --version
          cargo +stable --version
      - name: Check text hygiene
        run: |
          python3 scripts/check_text_hygiene.py
      - name: Report localization catalog health
        continue-on-error: true
        run: |
          python3 scripts/report_localization_catalog.py --github-annotations >> "$GITHUB_STEP_SUMMARY"
      - name: Run full Rust suite
        run: |
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml --test portable_modern_high_slow_tests -- --ignored
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml --test large_payload_tests -- --ignored

  rust-gnupg-interop:
    # Job key kept as rust-gnupg-interop (branch protection may pin the check
    # name); the display name covers both cross-tool interop lanes.
    name: Rust cross-tool interop (GnuPG + sq)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          rustc +stable --version
          cargo +stable --version
      - name: Install GnuPG + sq and assert interop version floors
        run: |
          brew install gnupg sequoia-sq
          bash scripts/assert_min_gpg_version.sh 2.4.0
          bash scripts/assert_min_sq_version.sh 1.3.0
      - name: Run GnuPG + sq cross-tool interop lanes (skips forbidden)
        env:
          CYPHERAIR_REQUIRE_GPG: "1"
          CYPHERAIR_REQUIRE_SQ: "1"
        run: |
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml \
            --test secure_enclave_gnupg_interop_tests \
            --test gnupg_binary_tests \
            --test sq_interop_tests \
            --test sq_live_interop_tests

  xcframework-package:
    needs: rust-full-tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select CI Xcode
        run: bash scripts/ci_xcode_platform_preflight.sh select
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          # Keep ordinary Rust validation on the official stable channel.
          # The arm64e stage1 compiler is resolved explicitly by build-xcframework.sh.
          rustc +stable --version
          cargo +stable --version
      - name: Check arm64e dependency chain freshness
        run: |
          python3 scripts/arm64e_release_metadata.py \
            --cargo-lock pgp-mobile/Cargo.lock \
            --output arm64e-dependency-chain.json \
            --freshness-level warn
      - name: Download arm64e stage1 toolchain
        run: scripts/download_arm64e_stage1_toolchain.sh "$RUNNER_TEMP/arm64e-stage1"
      - name: Build XCFramework and generated bindings
        env:
          ARM64E_STAGE1_FORCE_DOWNLOAD: "0"
        run: ./build-xcframework.sh --release
      - name: Package XCFramework artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent PgpMobile.xcframework "$XCFRAMEWORK_ZIP"
      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.XCFRAMEWORK_ARTIFACT_NAME }}
          path: |
            ${{ env.XCFRAMEWORK_ZIP }}
            ${{ env.ARM64E_MANIFEST }}
          retention-days: 5
          if-no-files-found: error

  apple-platform-probes:
    needs: xcframework-package
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check pinned-Xcode platform probe readiness
        id: platform_preflight
        run: bash scripts/ci_xcode_platform_preflight.sh preflight
      - name: Download XCFramework artifact
        if: steps.platform_preflight.outputs.ready == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.XCFRAMEWORK_ARTIFACT_NAME }}
      - name: Restore XCFramework from artifact
        if: steps.platform_preflight.outputs.ready == 'true'
        run: |
          rm -rf PgpMobile.xcframework
          ditto -x -k "$XCFRAMEWORK_ZIP" .
      - name: Restore SQLCipher XCFramework
        if: steps.platform_preflight.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/restore_sqlcipher_xcframework.sh --require-attestation
      # GitHub-hosted runners do not carry CypherAir signing material; these
      # generic probes are unsigned compile/link checks. Local and Xcode Cloud
      # app validation use signing and must not copy CODE_SIGNING_ALLOWED=NO.
      - name: Probe iOS build
        if: steps.platform_preflight.outputs.ready == 'true'
        run: |
          xcodebuild build \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
      - name: Probe visionOS build
        if: steps.platform_preflight.outputs.ready == 'true'
        run: |
          xcodebuild build \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -destination 'generic/platform=visionOS' \
            CODE_SIGNING_ALLOWED=NO
      - name: Skip Apple platform probes
        if: steps.platform_preflight.outputs.ready != 'true'
        run: |
          echo "::warning::Apple platform probes skipped: ${{ steps.platform_preflight.outputs.skip_reason }}"

  swift-unit-tests-hosted-preview:
    needs: xcframework-package
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check hosted Swift unit-test readiness
        id: swift_unit_preflight
        run: bash scripts/ci_xcode_platform_preflight.sh macos-unit-test-preflight
      - name: Download XCFramework artifact
        if: steps.swift_unit_preflight.outputs.ready == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.XCFRAMEWORK_ARTIFACT_NAME }}
      - name: Restore XCFramework from artifact
        if: steps.swift_unit_preflight.outputs.ready == 'true'
        run: |
          rm -rf PgpMobile.xcframework
          ditto -x -k "$XCFRAMEWORK_ZIP" .
      - name: Restore SQLCipher XCFramework
        if: steps.swift_unit_preflight.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/restore_sqlcipher_xcframework.sh --require-attestation
      - name: Run hosted macOS unit-test preview
        if: steps.swift_unit_preflight.outputs.ready == 'true'
        run: |
          xcodebuild test \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -testPlan CypherAir-UnitTests \
            -destination 'platform=macOS,arch=arm64e'
      - name: Skip hosted Swift unit tests
        if: steps.swift_unit_preflight.outputs.ready != 'true'
        run: |
          echo "::warning::Hosted Swift unit tests skipped: ${{ steps.swift_unit_preflight.outputs.skip_reason }}"
