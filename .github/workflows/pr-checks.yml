name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust-full-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run full Rust suite
        run: |
          cargo test --manifest-path pgp-mobile/Cargo.toml
          cargo test --manifest-path pgp-mobile/Cargo.toml --test profile_b_slow_tests -- --ignored
          cargo test --manifest-path pgp-mobile/Cargo.toml --test large_payload_tests -- --ignored

  swift-unit-tests:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run CypherAir unit tests
        run: |
          xcodebuild test \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -testPlan CypherAir-UnitTests \
            -destination 'platform=macOS,arch=arm64'
