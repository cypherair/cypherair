name: Nightly Full Validation

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  XCFRAMEWORK_ARTIFACT_NAME: pgpmobile-xcframework
  XCFRAMEWORK_ZIP: PgpMobile.xcframework.zip
  ARM64E_MANIFEST: PgpMobile.arm64e-build-manifest.json
  ARM64E_STAGE1_FORCE_DOWNLOAD: "1"
  ARM64E_STAGE1_RELEASE_TAG: latest

jobs:
  rust-dependency-audit:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          rustc +stable --version
          cargo +stable --version
      - name: Audit Rust dependencies
        run: |
          cargo +stable install cargo-audit --version 0.22.1 --locked
          cargo audit --file pgp-mobile/Cargo.lock --deny warnings

  rust-full-tests:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          # Keep ordinary Rust validation on the official stable channel.
          # The arm64e stage1 compiler is resolved explicitly by build-xcframework.sh.
          rustc +stable --version
          cargo +stable --version
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "pgp-mobile -> target"
      - name: Run full Rust suite
        run: |
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml --test profile_b_slow_tests -- --ignored
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml --test large_payload_tests -- --ignored

  xcframework-package:
    needs: rust-full-tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Select Xcode 26.4.1
        run: |
          set -euo pipefail

          if [ -n "${XCODE_26_DEVELOPER_DIR:-}" ] && [ -d "${XCODE_26_DEVELOPER_DIR}" ]; then
            SELECTED_DEVELOPER_DIR="${XCODE_26_DEVELOPER_DIR}"
          elif [ -d "/Applications/Xcode_26.4.1.app/Contents/Developer" ]; then
            SELECTED_DEVELOPER_DIR="/Applications/Xcode_26.4.1.app/Contents/Developer"
          else
            echo "::error::Xcode 26.4.1 was not found on this runner."
            exit 1
          fi

          echo "DEVELOPER_DIR=${SELECTED_DEVELOPER_DIR}" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="${SELECTED_DEVELOPER_DIR}"

          echo "Using DEVELOPER_DIR=${DEVELOPER_DIR}"
          xcode-select -p
          xcodebuild -version
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          # Keep ordinary Rust validation on the official stable channel.
          # The arm64e stage1 compiler is resolved explicitly by build-xcframework.sh.
          rustc +stable --version
          cargo +stable --version
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "pgp-mobile -> target"
      - name: Check arm64e dependency chain freshness
        run: |
          python3 scripts/arm64e_release_metadata.py \
            --cargo-lock pgp-mobile/Cargo.lock \
            --output arm64e-dependency-chain.json \
            --freshness-level warn
      - name: Build XCFramework and generated bindings
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./build-xcframework.sh --release
      - name: Package XCFramework artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent PgpMobile.xcframework "$XCFRAMEWORK_ZIP"
      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.XCFRAMEWORK_ARTIFACT_NAME }}
          path: |
            ${{ env.XCFRAMEWORK_ZIP }}
            ${{ env.ARM64E_MANIFEST }}
          retention-days: 5
          if-no-files-found: error
      - name: Probe iOS build
        run: |
          xcodebuild build \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
      - name: Probe visionOS build
        run: |
          xcodebuild build \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -destination 'generic/platform=visionOS' \
            CODE_SIGNING_ALLOWED=NO

  swift-unit-tests-hosted-preview:
    needs: xcframework-package
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Select Xcode 26.4.1
        run: |
          set -euo pipefail

          if [ -n "${XCODE_26_DEVELOPER_DIR:-}" ] && [ -d "${XCODE_26_DEVELOPER_DIR}" ]; then
            SELECTED_DEVELOPER_DIR="${XCODE_26_DEVELOPER_DIR}"
          elif [ -d "/Applications/Xcode_26.4.1.app/Contents/Developer" ]; then
            SELECTED_DEVELOPER_DIR="/Applications/Xcode_26.4.1.app/Contents/Developer"
          else
            echo "::error::Xcode 26.4.1 was not found on this runner."
            exit 1
          fi

          echo "DEVELOPER_DIR=${SELECTED_DEVELOPER_DIR}" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="${SELECTED_DEVELOPER_DIR}"

          echo "Using DEVELOPER_DIR=${DEVELOPER_DIR}"
          xcode-select -p
          xcodebuild -version
      - name: Download XCFramework artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.XCFRAMEWORK_ARTIFACT_NAME }}
      - name: Restore XCFramework from artifact
        run: |
          rm -rf PgpMobile.xcframework
          ditto -x -k "$XCFRAMEWORK_ZIP" .
      - name: Run hosted macOS unit-test preview
        run: |
          # Run as a separate failure signal until GitHub-hosted macOS reaches
          # 26.4 or the repository adopts a self-hosted macOS runner.
          xcodebuild test \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -testPlan CypherAir-UnitTests \
            -destination 'platform=macOS,arch=arm64'
