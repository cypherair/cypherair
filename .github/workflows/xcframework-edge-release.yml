name: XCFramework Edge Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag_prefix:
        description: Use `pgpmobile-edge` on `main` or `pgpmobile-drill-*` for non-main manual drills.
        required: true
        default: pgpmobile-edge
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  XCFRAMEWORK_ZIP: PgpMobile.xcframework.zip
  XCFRAMEWORK_CHECKSUM: PgpMobile.xcframework.sha256

jobs:
  publish-edge-release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Select Xcode 26.4.1
        run: |
          set -euo pipefail

          if [ -n "${XCODE_26_DEVELOPER_DIR:-}" ] && [ -d "${XCODE_26_DEVELOPER_DIR}" ]; then
            SELECTED_DEVELOPER_DIR="${XCODE_26_DEVELOPER_DIR}"
          elif [ -d "/Applications/Xcode_26.4.1.app/Contents/Developer" ]; then
            SELECTED_DEVELOPER_DIR="/Applications/Xcode_26.4.1.app/Contents/Developer"
          else
            echo "::error::Xcode 26.4.1 was not found on this runner."
            exit 1
          fi

          echo "DEVELOPER_DIR=${SELECTED_DEVELOPER_DIR}" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="${SELECTED_DEVELOPER_DIR}"

          echo "Using DEVELOPER_DIR=${DEVELOPER_DIR}"
          xcode-select -p
          xcodebuild -version
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "pgp-mobile -> target"
      - name: Resolve release settings
        env:
          INPUT_RELEASE_TAG_PREFIX: ${{ github.event.inputs.release_tag_prefix || 'pgpmobile-edge' }}
        run: |
          set -euo pipefail

          EVENT_NAME="${GITHUB_EVENT_NAME}"
          RELEASE_SOURCE_REF="${GITHUB_REF}"
          RELEASE_SIGNER_WORKFLOW="cypherair/cypherair/.github/workflows/xcframework-edge-release.yml"

          case "$EVENT_NAME" in
            push)
              RELEASE_TAG_PREFIX="pgpmobile-edge"
              if [ "$RELEASE_SOURCE_REF" != "refs/heads/main" ]; then
                echo "::error::Push-triggered edge releases are only allowed from refs/heads/main."
                exit 1
              fi
              ;;
            workflow_dispatch)
              RELEASE_TAG_PREFIX="${INPUT_RELEASE_TAG_PREFIX:-pgpmobile-edge}"
              ;;
            *)
              echo "::error::Unsupported event for edge release workflow: $EVENT_NAME"
              exit 1
              ;;
          esac

          if [ -z "$RELEASE_TAG_PREFIX" ]; then
            echo "::error::release_tag_prefix must not be empty."
            exit 1
          fi

          case "$RELEASE_TAG_PREFIX" in
            *[!A-Za-z0-9._-]*)
              echo "::error::release_tag_prefix may only contain letters, numbers, dots, underscores, and hyphens."
              exit 1
              ;;
          esac

          case "$RELEASE_TAG_PREFIX" in
            pgpmobile-edge)
              if [ "$RELEASE_SOURCE_REF" != "refs/heads/main" ]; then
                echo "::error::Canonical pgpmobile-edge releases are only allowed from refs/heads/main. Use a pgpmobile-drill-* prefix for non-main manual runs."
                exit 1
              fi
              RELEASE_CHANNEL="edge"
              RELEASE_CHANNEL_LABEL="Edge"
              RELEASE_METADATA="pgpmobile-edge.json"
              ;;
            pgpmobile-drill-?*)
              if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
                echo "::error::pgpmobile-drill-* prefixes are only allowed for workflow_dispatch runs."
                exit 1
              fi

              if [ "$RELEASE_SOURCE_REF" = "refs/heads/main" ]; then
                echo "::error::refs/heads/main must use the canonical pgpmobile-edge prefix."
                exit 1
              fi

              RELEASE_CHANNEL="drill"
              RELEASE_CHANNEL_LABEL="Drill"
              RELEASE_METADATA="pgpmobile-drill.json"
              ;;
            *)
              echo "::error::release_tag_prefix must be exactly pgpmobile-edge or match pgpmobile-drill-*."
              exit 1
              ;;
          esac

          RELEASE_TIMESTAMP="$(date -u +"%Y%m%dT%H%M%SZ")"
          SHORT_SHA="$(printf '%.7s' "$GITHUB_SHA")"
          RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
          RELEASE_TAG="${RELEASE_TAG_PREFIX}-${RELEASE_TIMESTAMP}-${SHORT_SHA}-r${GITHUB_RUN_ID}-a${RUN_ATTEMPT}"

          if ! git check-ref-format "refs/tags/$RELEASE_TAG"; then
            echo "::error::Generated release tag is not a valid Git ref: $RELEASE_TAG"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release tag already exists: $RELEASE_TAG"
            exit 1
          fi

          RELEASE_TITLE="PgpMobile ${RELEASE_CHANNEL_LABEL} XCFramework ($RELEASE_TAG)"
          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"

          {
            echo "RELEASE_CHANNEL=$RELEASE_CHANNEL"
            echo "RELEASE_TAG_PREFIX=$RELEASE_TAG_PREFIX"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "RELEASE_TITLE=$RELEASE_TITLE"
            echo "RELEASE_URL=$RELEASE_URL"
            echo "RELEASE_SOURCE_REF=$RELEASE_SOURCE_REF"
            echo "RELEASE_SIGNER_WORKFLOW=$RELEASE_SIGNER_WORKFLOW"
            echo "RELEASE_METADATA=$RELEASE_METADATA"
            echo "RUN_ATTEMPT=$RUN_ATTEMPT"
            echo "WORKFLOW_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "WORKFLOW_REF_NAME=${GITHUB_REF_NAME}"
          } >> "$GITHUB_ENV"
      - name: Run full Rust suite
        run: |
          cargo test --manifest-path pgp-mobile/Cargo.toml
          cargo test --manifest-path pgp-mobile/Cargo.toml --test profile_b_slow_tests -- --ignored
          cargo test --manifest-path pgp-mobile/Cargo.toml --test large_payload_tests -- --ignored
      - name: Build XCFramework and generated bindings
        run: ./build-xcframework.sh --release
      - name: Probe iOS build
        run: |
          xcodebuild build \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
      - name: Probe visionOS build
        run: |
          xcodebuild build \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -destination 'generic/platform=visionOS' \
            CODE_SIGNING_ALLOWED=NO
      - name: Package release assets
        run: |
          set -euo pipefail

          BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          XCODE_VERSION="$(xcodebuild -version | tr '\n' ' ' | sed 's/  */ /g; s/ $//')"
          RUSTC_VERSION="$(rustc --version)"
          MARKETING_VERSION="$(xcodebuild -showBuildSettings -scheme CypherAir -project CypherAir.xcodeproj | sed -n 's/^[[:space:]]*MARKETING_VERSION = //p' | head -n1)"
          PROJECT_BUILD_NUMBER="$(xcodebuild -showBuildSettings -scheme CypherAir -project CypherAir.xcodeproj | sed -n 's/^[[:space:]]*CURRENT_PROJECT_VERSION = //p' | head -n1)"

          ditto -c -k --sequesterRsrc --keepParent PgpMobile.xcframework "$XCFRAMEWORK_ZIP"
          shasum -a 256 "$XCFRAMEWORK_ZIP" > "$XCFRAMEWORK_CHECKSUM"

          {
            echo "BUILT_AT=$BUILT_AT"
            echo "XCODE_VERSION=$XCODE_VERSION"
            echo "RUSTC_VERSION=$RUSTC_VERSION"
            echo "MARKETING_VERSION=$MARKETING_VERSION"
            echo "PROJECT_BUILD_NUMBER=$PROJECT_BUILD_NUMBER"
          } >> "$GITHUB_ENV"

          cat > "$RELEASE_METADATA" <<EOF
          {
            "release_channel": "$RELEASE_CHANNEL",
            "release_tag": "$RELEASE_TAG",
            "release_url": "$RELEASE_URL",
            "commit_sha": "$GITHUB_SHA",
            "built_at": "$BUILT_AT",
            "run_id": "$GITHUB_RUN_ID",
            "run_attempt": "$RUN_ATTEMPT",
            "marketing_version": "$MARKETING_VERSION",
            "project_build_number": "$PROJECT_BUILD_NUMBER",
            "xcode_version": "$XCODE_VERSION",
            "rustc_version": "$RUSTC_VERSION",
            "workflow_url": "$WORKFLOW_URL",
            "source_ref": "$RELEASE_SOURCE_REF"
          }
          EOF

          cat > release-notes.md <<EOF
          Unique $RELEASE_CHANNEL prerelease XCFramework built from workflow ref \`$WORKFLOW_REF_NAME\`.

          - Release tag: \`$RELEASE_TAG\`
          - Release channel: \`$RELEASE_CHANNEL\`
          - Source ref: \`$RELEASE_SOURCE_REF\`
          - Commit: \`$GITHUB_SHA\`
          - Built at (UTC): \`$BUILT_AT\`
          - App marketing version: \`$MARKETING_VERSION\`
          - App build number: \`$PROJECT_BUILD_NUMBER\`
          - Xcode: \`$XCODE_VERSION\`
          - Rust: \`$RUSTC_VERSION\`
          - Workflow: [$WORKFLOW_URL]($WORKFLOW_URL)

          Assets:

          - \`$XCFRAMEWORK_ZIP\`
          - \`$XCFRAMEWORK_CHECKSUM\`
          - \`$RELEASE_METADATA\`

          Verification:

          \`\`\`bash
          shasum -a 256 -c "$XCFRAMEWORK_CHECKSUM"
          gh release verify "$RELEASE_TAG" -R "$GITHUB_REPOSITORY"
          gh release verify-asset "$RELEASE_TAG" "$XCFRAMEWORK_ZIP" -R "$GITHUB_REPOSITORY"
          gh attestation verify "$XCFRAMEWORK_ZIP" -R "$GITHUB_REPOSITORY" --signer-workflow "$RELEASE_SIGNER_WORKFLOW" --source-ref "$RELEASE_SOURCE_REF"
          \`\`\`
          EOF
      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ env.XCFRAMEWORK_ZIP }}
      - name: Create edge release tag
        run: |
          set -euo pipefail

          git fetch --tags --force origin
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release tag already exists: $RELEASE_TAG"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG"
      - name: Create draft edge prerelease
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" \
            --verify-tag \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes-file release-notes.md \
            --prerelease \
            --latest=false \
            --draft
      - name: Upload release assets to draft
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release upload "$RELEASE_TAG" \
            "$XCFRAMEWORK_ZIP" \
            "$XCFRAMEWORK_CHECKSUM" \
            "$RELEASE_METADATA"
      - name: Publish draft edge prerelease
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release edit "$RELEASE_TAG" \
            --draft=false \
            --prerelease \
            --latest=false
      - name: Cleanup failed draft release/tag
        if: ${{ failure() }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e

          warn() {
            echo "::warning::$1"
          }

          if [ -z "${RELEASE_TAG:-}" ]; then
            echo "No release tag resolved; skipping cleanup."
            exit 0
          fi

          release_is_draft="$(gh release view "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null)"
          release_status=$?

          if [ $release_status -eq 0 ]; then
            if [ "$release_is_draft" = "true" ]; then
              if ! gh release delete "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" --cleanup-tag --yes; then
                warn "Failed to delete draft release and tag for $RELEASE_TAG; manual cleanup may be required."
              fi
              exit 0
            fi

            warn "Release $RELEASE_TAG is no longer a draft; leaving release and tag in place."
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            if ! git push origin ":refs/tags/$RELEASE_TAG"; then
              warn "Failed to delete orphan tag $RELEASE_TAG; manual cleanup may be required."
            fi
            exit 0
          fi

          echo "No draft release or orphan tag found for $RELEASE_TAG."
