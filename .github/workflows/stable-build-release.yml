name: Stable Build Release

on:
  push:
    tags:
      - "cypherair-v*-build*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Stable release tag to validate or publish, e.g. cypherair-v1.2.8-build7
        required: true
        type: string
      source_ref:
        description: Git ref to checkout for dry-run validation. Formal publishing is tag-push only.
        required: true
        default: main
        type: string

permissions:
  contents: read

env:
  XCFRAMEWORK_ZIP: PgpMobile.xcframework.zip
  XCFRAMEWORK_CHECKSUM: PgpMobile.xcframework.sha256
  ARM64E_MANIFEST: PgpMobile.arm64e-build-manifest.json
  SOURCE_BUNDLE: CypherAir-source-bundle.tar.zst
  COMPLIANCE_MANIFEST: CypherAir-compliance-manifest.json
  RELINK_KIT: PgpMobile-relink-kit.tar.zst
  ARM64E_STAGE1_RELEASE_TAG: rust-arm64e-stage1-stable196-20260530T083949Z-ecc85bf-r26679152716-a1
  ARM64E_DEPENDENCY_FRESHNESS_LEVEL: error

jobs:
  rust-dependency-audit:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref }}
      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          rustup component add rustfmt --toolchain stable
          rustc +stable --version
          cargo +stable --version
      - name: Audit Rust dependencies
        run: |
          cargo +stable install cargo-audit --version 0.22.1 --locked
          cargo audit --file pgp-mobile/Cargo.lock --deny warnings

  build-stable-release-assets:
    runs-on: macos-26
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      create_release: ${{ steps.resolve.outputs.create_release }}
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      artifact_name: ${{ steps.resolve.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.source_ref || github.ref }}
      - name: Check Xcode 26.5 platform probe readiness
        id: platform_preflight
        run: bash scripts/ci_xcode_platform_preflight.sh preflight

      - name: Install Rust stable toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable
          # Keep ordinary Rust validation and release metadata on the official stable channel.
          # The arm64e stage1 compiler is resolved explicitly by build-xcframework.sh.
          rustup component add rustfmt --toolchain stable
          rustc +stable --version
          cargo +stable --version

      - name: Resolve stable release settings
        id: resolve
        env:
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          INPUT_SOURCE_REF: ${{ github.event.inputs.source_ref }}
        run: |
          set -euo pipefail

          EVENT_NAME="${GITHUB_EVENT_NAME}"
          case "$EVENT_NAME" in
            push)
              RELEASE_TAG="${GITHUB_REF_NAME}"
              RELEASE_SOURCE_REF="${GITHUB_REF}"
              CREATE_RELEASE="true"
              ;;
            workflow_dispatch)
              RELEASE_TAG="${INPUT_RELEASE_TAG}"
              RELEASE_SOURCE_REF="${INPUT_SOURCE_REF}"
              CREATE_RELEASE="false"
              ;;
            *)
              echo "::error::Unsupported event: $EVENT_NAME"
              exit 1
              ;;
          esac

          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^cypherair-v[0-9]+\.[0-9]+\.[0-9]+-build[0-9]+$'; then
            echo "::error::Stable release tag must match cypherair-vX.Y.Z-buildN."
            exit 1
          fi

          RELEASE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          COMMIT_SHA="$(git rev-parse HEAD)"
          STABLE_RELEASE_ARTIFACT="stable-build-release-assets-${RELEASE_TAG}"

          {
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "RELEASE_SOURCE_REF=$RELEASE_SOURCE_REF"
            echo "RELEASE_URL=$RELEASE_URL"
            echo "CREATE_RELEASE=$CREATE_RELEASE"
            echo "COMMIT_SHA=$COMMIT_SHA"
            echo "STABLE_RELEASE_ARTIFACT=$STABLE_RELEASE_ARTIFACT"
          } >> "$GITHUB_ENV"

          {
            echo "release_tag=$RELEASE_TAG"
            echo "create_release=$CREATE_RELEASE"
            echo "commit_sha=$COMMIT_SHA"
            echo "artifact_name=$STABLE_RELEASE_ARTIFACT"
          } >> "$GITHUB_OUTPUT"

      - name: Validate publish source matches stable tag
        if: steps.resolve.outputs.create_release == 'true'
        run: |
          set -euo pipefail

          TAG_COMMIT="$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")"
          if [ "$COMMIT_SHA" != "$TAG_COMMIT" ]; then
            echo "::error::Stable release publishing requires checked-out HEAD $COMMIT_SHA to match $RELEASE_TAG commit $TAG_COMMIT."
            exit 1
          fi

      - name: Validate tag against project version
        run: |
          set -euo pipefail

          TAG_VERSION="$(printf '%s' "$RELEASE_TAG" | sed -E 's/^cypherair-v([0-9]+\.[0-9]+\.[0-9]+)-build([0-9]+)$/\1/')"
          TAG_BUILD="$(printf '%s' "$RELEASE_TAG" | sed -E 's/^cypherair-v([0-9]+\.[0-9]+\.[0-9]+)-build([0-9]+)$/\2/')"
          MARKETING_VERSION="$(xcodebuild -showBuildSettings -scheme CypherAir -project CypherAir.xcodeproj | sed -n 's/^[[:space:]]*MARKETING_VERSION = //p' | head -n1)"
          PROJECT_BUILD_NUMBER="$(xcodebuild -showBuildSettings -scheme CypherAir -project CypherAir.xcodeproj | sed -n 's/^[[:space:]]*CURRENT_PROJECT_VERSION = //p' | head -n1)"

          if [ "$TAG_VERSION" != "$MARKETING_VERSION" ]; then
            echo "::error::Release tag marketing version $TAG_VERSION does not match project MARKETING_VERSION $MARKETING_VERSION."
            exit 1
          fi
          if [ "$TAG_BUILD" != "$PROJECT_BUILD_NUMBER" ]; then
            echo "::error::Release tag build $TAG_BUILD does not match CURRENT_PROJECT_VERSION $PROJECT_BUILD_NUMBER."
            exit 1
          fi

          {
            echo "MARKETING_VERSION=$MARKETING_VERSION"
            echo "PROJECT_BUILD_NUMBER=$PROJECT_BUILD_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Check formatting and text hygiene
        run: |
          cargo +stable fmt --manifest-path pgp-mobile/Cargo.toml --all -- --check
          python3 scripts/check_text_hygiene.py

      - name: Run full Rust suite
        run: |
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml --test profile_b_slow_tests -- --ignored
          cargo +stable test --manifest-path pgp-mobile/Cargo.toml --test large_payload_tests -- --ignored

      - name: Check arm64e dependency chain freshness
        run: |
          python3 scripts/arm64e_release_metadata.py \
            --cargo-lock pgp-mobile/Cargo.lock \
            --output arm64e-dependency-chain.json \
            --freshness-level error

      - name: Download arm64e stage1 toolchain
        run: scripts/download_arm64e_stage1_toolchain.sh "$RUNNER_TEMP/arm64e-stage1"

      - name: Build XCFramework and generated bindings
        env:
          ARM64E_STAGE1_FORCE_DOWNLOAD: "0"
        run: ./build-xcframework.sh --release

      - name: Probe iOS build with stable compliance metadata
        if: steps.platform_preflight.outputs.ready == 'true'
        run: |
          SOURCE_COMPLIANCE_COMMIT_SHA="$COMMIT_SHA" \
          SOURCE_COMPLIANCE_STABLE_RELEASE_TAG="$RELEASE_TAG" \
          SOURCE_COMPLIANCE_STABLE_RELEASE_URL="$RELEASE_URL" \
          xcodebuild build \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Probe visionOS build with stable compliance metadata
        if: steps.platform_preflight.outputs.ready == 'true'
        run: |
          SOURCE_COMPLIANCE_COMMIT_SHA="$COMMIT_SHA" \
          SOURCE_COMPLIANCE_STABLE_RELEASE_TAG="$RELEASE_TAG" \
          SOURCE_COMPLIANCE_STABLE_RELEASE_URL="$RELEASE_URL" \
          xcodebuild build \
            -scheme CypherAir \
            -project CypherAir.xcodeproj \
            -destination 'generic/platform=visionOS' \
            CODE_SIGNING_ALLOWED=NO

      - name: Skip Apple platform probes
        if: steps.platform_preflight.outputs.ready != 'true'
        run: |
          echo "::warning::Apple platform probes skipped: ${{ steps.platform_preflight.outputs.skip_reason }}"

      - name: Package stable binary and compliance assets
        run: |
          set -euo pipefail

          BUILT_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          XCODE_VERSION="$(xcodebuild -version | tr '\n' ' ' | sed 's/  */ /g; s/ $//')"
          RUSTC_VERSION="$(rustc +stable --version)"

          ditto -c -k --sequesterRsrc --keepParent PgpMobile.xcframework "$XCFRAMEWORK_ZIP"
          shasum -a 256 "$XCFRAMEWORK_ZIP" > "$XCFRAMEWORK_CHECKSUM"

          python3 scripts/build_xcframework_relink_kit.py \
            --release-tag "$RELEASE_TAG" \
            --marketing-version "$MARKETING_VERSION" \
            --build-number "$PROJECT_BUILD_NUMBER" \
            --commit-sha "$COMMIT_SHA" \
            --xcframework-zip "$XCFRAMEWORK_ZIP" \
            --arm64e-manifest "$ARM64E_MANIFEST" \
            --output "$RELINK_KIT"

          python3 scripts/build_compliance_release_assets.py \
            --release-tag "$RELEASE_TAG" \
            --channel stable \
            --marketing-version "$MARKETING_VERSION" \
            --build-number "$PROJECT_BUILD_NUMBER" \
            --commit-sha "$COMMIT_SHA" \
            --source-bundle-output "$SOURCE_BUNDLE" \
            --manifest-output "$COMPLIANCE_MANIFEST" \
            --arm64e-manifest "$ARM64E_MANIFEST" \
            --binary-asset "$XCFRAMEWORK_ZIP" \
            --binary-asset "$XCFRAMEWORK_CHECKSUM" \
            --binary-asset "$ARM64E_MANIFEST" \
            --binary-asset "$RELINK_KIT"

          {
            echo "BUILT_AT=$BUILT_AT"
            echo "XCODE_VERSION=$XCODE_VERSION"
            echo "RUSTC_VERSION=$RUSTC_VERSION"
          } >> "$GITHUB_ENV"

      - name: Generate release notes
        env:
          APPLE_PLATFORM_PROBES_READY: ${{ steps.platform_preflight.outputs.ready }}
          APPLE_PLATFORM_PROBES_SKIP_REASON: ${{ steps.platform_preflight.outputs.skip_reason }}
        run: |
          if [ "$APPLE_PLATFORM_PROBES_READY" = "true" ]; then
            APPLE_PLATFORM_PROBES_SUMMARY="Apple app build probes passed for generic iOS and visionOS."
          else
            APPLE_PLATFORM_PROBES_SKIP_REASON="${APPLE_PLATFORM_PROBES_SKIP_REASON:-unknown hosted runner readiness failure}"
            APPLE_PLATFORM_PROBES_SUMMARY="Apple app build probes were skipped because the hosted runner was not Xcode 26.5 platform-ready: $APPLE_PLATFORM_PROBES_SKIP_REASON."
          fi

          cat > release-notes.md <<EOF
          Exact source and compliance materials for stable build \`$RELEASE_TAG\`.

          - Release tag: \`$RELEASE_TAG\`
          - Source ref: \`$RELEASE_SOURCE_REF\`
          - Commit: \`$COMMIT_SHA\`
          - Built at (UTC): \`$BUILT_AT\`
          - App marketing version: \`$MARKETING_VERSION\`
          - App build number: \`$PROJECT_BUILD_NUMBER\`
          - Xcode: \`$XCODE_VERSION\`
          - Rust: \`$RUSTC_VERSION\`

          This stable build page is the exact source and compliance landing page for the tagged App build and the stable \`PgpMobile.xcframework\` assets.

          Release readiness:

          - Formal GitHub Release creation is gated on this workflow run's \`rust-dependency-audit\` job.
          - $APPLE_PLATFORM_PROBES_SUMMARY
          - If the audit fails, these files may exist only as workflow artifacts and must not be treated as release-ready.
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Assets:

          - \`$SOURCE_BUNDLE\`
          - \`$COMPLIANCE_MANIFEST\`
          - \`$XCFRAMEWORK_ZIP\`
          - \`$XCFRAMEWORK_CHECKSUM\`
          - \`$ARM64E_MANIFEST\`
          - \`$RELINK_KIT\`
          EOF

      - name: Upload stable release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.STABLE_RELEASE_ARTIFACT }}
          path: |
            ${{ env.SOURCE_BUNDLE }}
            ${{ env.COMPLIANCE_MANIFEST }}
            ${{ env.XCFRAMEWORK_ZIP }}
            ${{ env.XCFRAMEWORK_CHECKSUM }}
            ${{ env.ARM64E_MANIFEST }}
            ${{ env.RELINK_KIT }}
            release-notes.md
          retention-days: 7
          if-no-files-found: error

  publish-stable-release:
    needs:
      - rust-dependency-audit
      - build-stable-release-assets
    if: needs.build-stable-release-assets.outputs.create_release == 'true'
    runs-on: macos-26
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ needs.build-stable-release-assets.outputs.release_tag }}
      COMMIT_SHA: ${{ needs.build-stable-release-assets.outputs.commit_sha }}
      STABLE_RELEASE_ARTIFACT: ${{ needs.build-stable-release-assets.outputs.artifact_name }}
    steps:
      - name: Download stable release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.STABLE_RELEASE_ARTIFACT }}

      - name: Verify stable release assets
        run: |
          set -euo pipefail

          for asset in \
            "$SOURCE_BUNDLE" \
            "$COMPLIANCE_MANIFEST" \
            "$XCFRAMEWORK_ZIP" \
            "$XCFRAMEWORK_CHECKSUM" \
            "$ARM64E_MANIFEST" \
            "$RELINK_KIT" \
            release-notes.md
          do
            if [ ! -f "$asset" ]; then
              echo "::error::Missing stable release asset: $asset"
              exit 1
            fi
          done

          shasum -a 256 -c "$XCFRAMEWORK_CHECKSUM"

      - name: Revalidate stable tag before publishing
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          read -r tag_object_type tag_object_sha < <(
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" \
              --jq '.object | [.type, .sha] | @tsv'
          )

          if [ "$tag_object_type" != "tag" ]; then
            echo "::error::Stable tag $RELEASE_TAG must be an annotated signed tag, got $tag_object_type"
            exit 1
          fi

          tag_object_json="$(mktemp)"
          gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}" > "$tag_object_json"
          python3 - "$tag_object_json" "$RELEASE_TAG" "$COMMIT_SHA" <<'PY'
          import json
          import sys

          path, release_tag, commit_sha = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path, encoding="utf-8") as handle:
              tag_object = json.load(handle)

          errors = []
          tag_name = tag_object.get("tag")
          if tag_name != release_tag:
              errors.append(f"tag object name {tag_name!r} does not match {release_tag!r}")

          target = tag_object.get("object") or {}
          target_type = target.get("type")
          tag_commit = target.get("sha")
          if target_type != "commit":
              errors.append(f"stable tag peels to {target_type!r}, not commit")
          elif tag_commit != commit_sha:
              errors.append(f"stable tag now resolves to {tag_commit}, expected {commit_sha}")

          verification = tag_object.get("verification") or {}
          signature = verification.get("signature") or ""
          if verification.get("verified") is not True:
              errors.append(f"stable tag signature is not verified: {verification.get('reason')}")
          if verification.get("reason") != "valid":
              errors.append(f"stable tag signature verification reason is {verification.get('reason')!r}")
          if not signature.startswith("-----BEGIN SSH SIGNATURE-----"):
              errors.append("stable tag must be SSH-signed")

          if errors:
              for error in errors:
                  print(f"::error::{error}", file=sys.stderr)
              sys.exit(1)

          print(f"Stable tag {release_tag} is an SSH-signed annotated tag for {tag_commit}")
          PY
          rm -f "$tag_object_json"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ${{ env.SOURCE_BUNDLE }}
            ${{ env.COMPLIANCE_MANIFEST }}
            ${{ env.XCFRAMEWORK_ZIP }}
            ${{ env.XCFRAMEWORK_CHECKSUM }}
            ${{ env.ARM64E_MANIFEST }}
            ${{ env.RELINK_KIT }}

      - name: Create immutable stable release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release already exists for $RELEASE_TAG. Stable assets are immutable."
            exit 1
          fi

          gh release create "$RELEASE_TAG" -R "$GITHUB_REPOSITORY" \
            --verify-tag \
            --target "$COMMIT_SHA" \
            --title "CypherAir Stable Build ($RELEASE_TAG)" \
            --notes-file release-notes.md \
            "$SOURCE_BUNDLE" \
            "$COMPLIANCE_MANIFEST" \
            "$XCFRAMEWORK_ZIP" \
            "$XCFRAMEWORK_CHECKSUM" \
            "$ARM64E_MANIFEST" \
            "$RELINK_KIT"
