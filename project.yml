name: CypherAir
options:
  bundleIdPrefix: com.cypherair
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  CypherAir:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cypherair.app
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/pgp-mobile/target/aarch64-apple-ios-sim/release"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-lpgp_mobile"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/bindings"
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/bindings"
        OTHER_CFLAGS:
          - "$(inherited)"
          - "-fmodule-map-file=$(PROJECT_DIR)/bindings/module.modulemap"
        OTHER_SWIFT_FLAGS:
          - "$(inherited)"
          - "-Xcc"
          - "-fmodule-map-file=$(PROJECT_DIR)/bindings/module.modulemap"

  CypherAirTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/FFIIntegrationTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: CypherAir
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cypherair.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CypherAir.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CypherAir"
        BUNDLE_LOADER: "$(TEST_HOST)"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/bindings"
        SWIFT_INCLUDE_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/bindings"
        OTHER_CFLAGS:
          - "$(inherited)"
          - "-fmodule-map-file=$(PROJECT_DIR)/bindings/module.modulemap"
        OTHER_SWIFT_FLAGS:
          - "$(inherited)"
          - "-Xcc"
          - "-fmodule-map-file=$(PROJECT_DIR)/bindings/module.modulemap"
