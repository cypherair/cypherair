[package]
name = "pgp-mobile"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-or-later"
description = "OpenPGP wrapper for Cypher Air iOS app, powered by Sequoia PGP"

[lib]
crate-type = ["lib", "staticlib"]
name = "pgp_mobile"

[[bin]]
name = "uniffi-bindgen"
path = "uniffi-bindgen.rs"

[dependencies]
sequoia-openpgp = { version = "2.2", default-features = false, features = [
    "crypto-openssl",
    "compression-deflate",
] }
uniffi = { version = "0.29", features = ["cli"] }
openssl = { version = "0.10", features = ["vendored"] }
zeroize = { version = "1", features = ["derive"] }
base64 = "0.22"
thiserror = "2"

[dev-dependencies]
tempfile = "3"
rand = "0.8" # Test-only: NOT used in production code

[build-dependencies]
uniffi = { version = "0.29", features = ["build"] }

[profile.release]
lto = true
strip = "symbols"
codegen-units = 1
